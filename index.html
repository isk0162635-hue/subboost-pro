<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>SubBoost - Watch & Earn</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #0f0f0f; color: #fff; }
        
        .navbar { background: #000; padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #222; }
        .logo { font-size: 1.5rem; font-weight: 800; color: #ff0000; }
        .nav-actions { display: flex; align-items: center; gap: 15px; }
        .coin-badge { background: #272727; border-radius: 50px; padding: 8px 16px; font-weight: 700; color: #ffd700; display: flex; align-items: center; gap: 8px; }
        .user-avatar { width: 38px; height: 38px; border-radius: 50%; border: 2px solid #ff0000; cursor: pointer; object-fit: cover; }
        .login-btn { background: #ff0000; color: white; border: none; padding: 8px 20px; border-radius: 50px; font-weight: 600; cursor: pointer; }
        
        .hero { background: linear-gradient(135deg, #ff0000, #cc0000); padding: 40px 20px; text-align: center; }
        .hero h2 { font-size: 28px; font-weight: 800; }
        
        .container { max-width: 550px; margin: 0 auto; padding: 20px 15px 100px; }
        
        .tabs { display: flex; gap: 10px; background: #1a1a1a; padding: 8px; border-radius: 50px; margin-bottom: 25px; }
        .tab { flex: 1; padding: 10px; border: none; border-radius: 50px; font-weight: 600; background: transparent; cursor: pointer; color: #aaa; }
        .tab.active { background: #ff0000; color: white; }
        
        .video-card { background: #1a1a1a; border-radius: 20px; overflow: hidden; margin-bottom: 25px; border: 1px solid #333; }
        .yt-iframe { width: 100%; aspect-ratio: 16/9; border: none; }
        
        .card-body { padding: 20px; }
        .video-title { font-weight: 700; font-size: 1rem; margin-bottom: 15px; color: #fff; }
        
        .action-buttons { display: flex; gap: 15px; margin: 15px 0; }
        .action-btn { flex: 1; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; border: none; }
        .like-btn { background: #3a3a3a; color: #fff; }
        .like-btn.liked { background: #1877f2; color: white; }
        .subs-btn { background: #3a3a3a; color: #fff; }
        .subs-btn.subscribed { background: #ff0000; color: white; }
        .reward-badge { background: #272727; padding: 8px 15px; border-radius: 50px; font-size: 13px; display: inline-block; margin-bottom: 15px; color: #ffd700; }
        
        .btn-main { width: 100%; background: #ff0000; color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        .fab { position: fixed; bottom: 25px; right: 20px; width: 55px; height: 55px; background: #ff0000; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; color: white; z-index: 99; cursor: pointer; box-shadow: 0 4px 15px rgba(255,0,0,0.3); }
        
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #1a1a1a; border-radius: 24px; width: 100%; max-width: 400px; padding: 30px; }
        input, select { width: 100%; padding: 14px; border: 1px solid #333; border-radius: 12px; margin: 10px 0; background: #2a2a2a; color: #fff; }
        
        .ad-container { text-align: center; margin: 15px 0; min-height: 90px; }
    </style>
</head>
<body>

<div class="app">
    <nav class="navbar">
        <div class="logo">SubBoost</div>
        <div class="nav-actions">
            <div id="coinBox" class="coin-badge" style="display:none">
                <i class="fas fa-coins"></i> <span id="coinAmount">0</span>
            </div>
            <button id="loginBtn" class="login-btn" onclick="showAuth()">Sign In</button>
            <img id="userImg" class="user-avatar" style="display:none" onclick="showAuth()">
        </div>
    </nav>

    <div class="hero">
        <h2>Watch & Earn Coins 🎯</h2>
        <p style="opacity:0.9; margin-top:8px;">Like, Subscribe & Get Rewarded</p>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('views')">Views</button>
            <button class="tab" onclick="switchTab('my')">My Videos</button>
        </div>
        <div id="videoList"></div>
    </div>

    <div class="fab" onclick="openPost()"><i class="fas fa-plus"></i></div>
</div>

<div id="postModal" class="modal">
    <div class="modal-content">
        <h3 style="margin-bottom:20px;">Upload Your Video</h3>
        <input type="text" id="postUrl" placeholder="YouTube Video Link">
        <input type="text" id="postTitle" placeholder="Video Title">
        <div style="text-align:center; margin:15px 0;"><strong>Cost: 300 Coins</strong></div>
        <button class="btn-main" onclick="savePost()">Post Now</button>
        <button onclick="closePost()" style="width:100%; margin-top:10px; background:#333; border:none; padding:12px; border-radius:12px; color:#fff; cursor:pointer;">Cancel</button>
    </div>
</div>

<div id="authModal" class="modal">
    <div class="modal-content" style="text-align:center">
        <h3>Get Started</h3>
        <p style="margin:15px 0;">Sign in to earn 500 free coins!</p>
        <button onclick="googleLogin()" style="width:100%; padding:12px; border-radius:12px; background:#fff; font-weight:700; cursor:pointer;">
            <i class="fab fa-google"></i> Continue with Google
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
