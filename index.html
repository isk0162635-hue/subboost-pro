<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SubBoost Pro - Genuine Growth</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <style>
        :root { --primary: #ff0000; --dark: #1a1a1b; --bg: #f8f9fa; --white: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background: var(--bg); color: var(--dark); overflow-x: hidden; }
        .top-nav { background: var(--white); height: 75px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 15px rgba(0,0,0,0.05); }
        .app-logo { font-size: 24px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
        .user-meta { display: flex; align-items: center; gap: 12px; }
        .coin-pill { background: #fff9e6; border: 2px solid #ffd700; padding: 6px 14px; border-radius: 50px; font-weight: 700; color: #856404; display: none; align-items: center; gap: 6px; }
        .ref-pill { background: #eef2ff; border-radius: 50px; padding: 6px 14px; font-size: 13px; font-weight: 600; color: #1e3a8a; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .ad-container-top { width: 100%; display: flex; justify-content: center; padding: 10px 0; background: #fff; border-bottom: 1px solid #eee; }
        .landing { padding: 40px 20px; text-align: center; background: var(--white); border-radius: 0 0 40px 40px; }
        .live-counter { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .count-box { background: var(--bg); padding: 15px; border-radius: 18px; min-width: 140px; border: 1px solid #eee; }
        .count-box h2 { color: var(--primary); font-size: 32px; font-weight: 800; }
        .tab-menu { background: var(--white); display: none; padding: 12px; position: sticky; top: 75px; z-index: 999; border-bottom: 1px solid #eee; justify-content: space-around; }
        .tab-link { padding: 10px 20px; font-weight: 700; color: #777; cursor: pointer; border-radius: 12px; transition: 0.3s; font-size: 14px; text-transform: uppercase; }
        .tab-link.active { background: #fdf2f2; color: var(--primary); }
        .scroll-feed { max-width: 550px; margin: 10px auto; padding: 0 15px 120px; display: none; }
        .video-item { background: var(--white); border-radius: 25px; overflow: hidden; margin-bottom: 25px; box-shadow: 0 8px 25px rgba(0,0,0,0.04); border: 1px solid #f0f0f0; }
        .video-preview { width: 100%; aspect-ratio: 16/9; position: relative; background: #000; }
        .video-preview img { width: 100%; height: 100%; object-fit: cover; }
        .video-info { padding: 20px; }
        .main-btn { width: 100%; background: var(--primary); color: #fff; border: none; padding: 16px; border-radius: 18px; font-weight: 700; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-logout { font-size: 13px; font-weight: 700; color: #999; cursor: pointer; display: none; }
        .btn-delete { background: #f8f9fa; color: #ff4444; border: 1px solid #ffebeb; margin-top: 10px; }
        .ad-sidebar { display: flex; justify-content: center; margin: 20px 0; }
        .add-post-fab { position: fixed; bottom: 35px; right: 25px; width: 65px; height: 65px; background: var(--primary); color: #fff; border-radius: 50%; display: none; align-items: center; justify-content: center; font-size: 26px; box-shadow: 0 10px 25px rgba(255,0,0,0.3); z-index: 1000; cursor: pointer; }
        #action-lock-screen { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 9999; flex-direction: column; align-items: center; justify-content: center; color: #fff; text-align: center; backdrop-filter: blur(5px); }
        .countdown { width: 90px; height: 90px; border: 6px solid var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 800; margin-bottom: 30px; }
        .post-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 6000; padding: 20px; }
        .modal-ui { background: #fff; border-radius: 35px; max-width: 480px; margin: 40px auto; padding: 35px; }
        .form-input { width: 100%; padding: 18px; border: 2px solid #f0f2f5; border-radius: 18px; margin: 10px 0 25px; outline: none; font-weight: 600; font-size: 15px; }
        .toast-msg { position: fixed; bottom: 30px; left: 20px; right: 20px; background: #1f2937; color: white; padding: 14px; border-radius: 30px; text-align: center; z-index: 11000; font-weight: 600; transition: 0.3s; opacity: 0; pointer-events: none; }
        .warning-text { color: #ff9800; font-size: 12px; margin-top: 8px; }
    </style>
</head>
<body>

<nav class="top-nav">
    <div class="app-logo">SubBoost Pro</div>
    <div class="user-meta">
        <div id="ref-code-ui" class="ref-pill" onclick="copyReferralCode()"><i class="fas fa-link"></i> <span id="ref-code-text">REF</span> <i class="fas fa-copy"></i></div>
        <div id="coin-ui" class="coin-pill"><i class="fas fa-coins"></i> <span id="user-bal">0</span></div>
        <div id="btn-exit" class="btn-logout" onclick="handleLogout()">LOGOUT</div>
    </div>
</nav>

<div class="ad-container-top">
    <script>
      atOptions = { 'key' : '16cc1a4969502ddb6b19ef798c3cd03a', 'format' : 'iframe', 'height' : 60, 'width' : 468, 'params' : {} };
    </script>
    <script src="https://www.highperformanceformat.com/16cc1a4969502ddb6b19ef798c3cd03a/invoke.js"></script>
</div>

<div id="login-gate">
    <div class="landing">
        <i class="fab fa-youtube" style="font-size: 80px; color: var(--primary);"></i>
        <h1>Growth Community</h1>
        <div class="live-counter">
            <div class="count-box"><h2 id="st-users">0</h2><p>Active Users</p></div>
            <div class="count-box"><h2 id="st-tasks">0</h2><p>Live Projects</p></div>
        </div>
        <button class="main-btn" onclick="handleLogin()" style="width: auto; padding: 20px 50px; margin: 20px auto;">Login with Gmail (100 Bonus)</button>
    </div>
</div>

<div class="tab-menu" id="nav-tabs">
    <div class="tab-link active" onclick="setTab('view', event)">VIEWS</div>
    <div class="tab-link" onclick="setTab('subs', event)">SUBSCRIBE</div>
    <div class="tab-link" onclick="setTab('mine', event)">MY PROJECTS</div>
</div>

<div class="scroll-feed" id="feed-ui">
    <div id="video-grid"></div>
    <div class="ad-sidebar">
        <script>
          atOptions = { 'key' : 'bd1be10578b4ccbb0aa5f955356a74c3', 'format' : 'iframe', 'height' : 300, 'width' : 160, 'params' : {} };
        </script>
        <script src="https://www.highperformanceformat.com/bd1be10578b4ccbb0aa5f955356a74c3/invoke.js"></script>
    </div>
</div>

<div class="add-post-fab" id="fab-action" onclick="openModal()"><i class="fas fa-plus"></i></div>

<div id="action-lock-screen">
    <div class="countdown" id="lock-timer-display">15</div>
    <h2>Don't Close!</h2>
    <p>Complete action on YouTube to earn coins...</p>
</div>

<div class="post-modal" id="post-modal-ui">
    <div class="modal-ui">
        <h2>New Campaign</h2>
        <input type="text" id="inp-url" class="form-input" placeholder="Paste YouTube Link">
        <select id="inp-type" class="form-input">
            <option value="view">View Boost (Earn 1 coin per view)</option>
            <option value="subs">Subscribe Boost (Earn 2 coins per sub)</option>
        </select>
        <input type="number" id="inp-qty" class="form-input" value="10" min="10" oninput="updateCost()">
        <div style="background: #fdf2f2; padding: 18px; border-radius: 18px; font-weight: 800; color: var(--primary); text-align: center;">Cost: <span id="cost-display">1250</span> Coins</div>
        <div id="campaign-warning" class="warning-text"></div>
        <button class="main-btn" style="margin-top: 25px;" onclick="startCampaign()">Launch Project</button>
        <button onclick="closeModal()" style="width: 100%; border: none; background: none; margin-top: 15px; color: #999; font-weight: 700; cursor: pointer;">CANCEL</button>
    </div>
</div>

<div id="toast-message" class="toast-msg"></div>

<script src="app.js"></script>
</body>
</html>
